services:
  - type: web
    name: kasimob-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: kasimob-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      # ---- Required M-Pesa vars (set in Render dashboard) ----
      # - key: MPESA_CONSUMER_KEY
      # - key: MPESA_CONSUMER_SECRET
      # - key: MPESA_SHORTCODE
      # - key: MPESA_PASSKEY
      # - key: MPESA_BASE_URL
      # - key: MPESA_CALLBACK_URL
      # ---- Admin & session ----
      # - key: ADMIN_PASSWORD
      # - key: SESSION_SECRET
      # ---- Google Sign-In (optional) ----
      # - key: GOOGLE_CLIENT_ID
      #   value: 1234567890-abc.apps.googleusercontent.com
      # ---- Email / SMTP (welcome + receipt + reset-password) ----
      # Recommended: Gmail with a 16-char App Password (Account -> Security -> 2FA -> App passwords)
      # - key: SMTP_HOST
      #   value: smtp.gmail.com
      # - key: SMTP_PORT
      #   value: "465"
      # - key: SMTP_SECURE
      #   value: "true"
      # - key: SMTP_USER
      #   value: kasisim388@gmail.com
      # - key: SMTP_PASS
      #   value: your-gmail-app-password
      # - key: MAIL_FROM
      #   value: KASIMOB <kasisim388@gmail.com>
      # - key: SHOP_EMAIL
      #   value: kasisim388@gmail.com
      # - key: PUBLIC_BASE_URL
      #   value: https://kasimobshopbackend.onrender.com

services:
  - type: web
    name: kasimob-backend
    runtime: node
    plan: free
    buildCommand: apt-get update && apt-get install -y python3 make g++ && npm install
    startCommand: npm start
    disk:
      name: kasimob-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 18
      # ... your other env vars